<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engagement Memories 💍</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Share Your Moments 💖</h1>

  <!-- Video feed -->
  <video id="video" autoplay playsinline></video>

  <!-- Camera controls -->
  <div id="controls">
    <button id="switchCamera">Switch Camera</button>
    <button id="capturePhoto">Capture Photo</button>
    <button id="recordVideo">Start Recording</button>
  </div>

  <!-- Camera label -->
  <div id="cameraLabel">Front Camera</div>

  <!-- Gallery -->
  <h2>Gallery</h2>
  <div id="gallery"></div>

  <script src="script.js"></script>
</body>
</html>
